<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Before The Ramayana</title>
  <link rel="stylesheet" href="Project.css">
  <link rel="icon" href="favicon1.png" type="image/png">
</head>
<body id="backstorybody">
  <nav id="topNavbar" aria-label="Site navigation">
    <button id="navbarToggle" type="button" aria-label="Toggle navigation menu" aria-expanded="false" aria-controls="navLinks">☰</button>
    <div id="navLinks">
      <a id="aboutButton" href="index.html">Main Adventure</a>
      <a class="nav-link-pill" href="people-of-ramayana.html">People of the Ramayana</a>
    </div>
  </nav>

  <div id="titleContainer">
    <header>
      <h1>The Ramayana</h1>
      <h3 class="subtitle">COMING SOON!</h3>
      <h4 id="description">Explore the events that lead up to the great Indian Epic of Ramayana.</h4>
      <p>Make choices and determine new ways the Ramayana could have begun, or if it even happened at all.</p>
      <button onclick="window.location.href='index.html'">Experience The Ramayana</button>
      <button onclick="window.location.href='people-of-ramayana.html'">People of the Ramayana</button>
    </header>
  </div>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      var navbarToggle = document.getElementById("navbarToggle");
      var topNavbar = document.getElementById("topNavbar");

      if (!navbarToggle || !topNavbar) {
        return;
      }

      navbarToggle.addEventListener("click", function () {
        var isOpen = topNavbar.classList.toggle("nav-open");
        navbarToggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
      });

      document.addEventListener("click", function (event) {
        if (!window.matchMedia("(max-width: 768px)").matches) {
          return;
        }

        if (!topNavbar.classList.contains("nav-open")) {
          return;
        }

        if (topNavbar.contains(event.target)) {
          return;
        }

        topNavbar.classList.remove("nav-open");
        navbarToggle.setAttribute("aria-expanded", "false");
      });
    });
  </script>
</body>
</html>
